name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            Review this PR against the Codec Chat project standards:

            ## Security (CRITICAL — block PR if found)
            - Missing [Authorize] on new endpoints
            - Raw SQL or string interpolation in EF Core queries
            - {@html} with user-controlled content in Svelte components
            - Hardcoded secrets or API keys
            - Missing input validation on new request DTOs
            - CSP updates needed for new external service domains

            ## Code Conventions
            - C# 14: nullable refs enabled, file-scoped namespaces, PascalCase public, camelCase private, `is null` not `== null`, pattern matching
            - Svelte 5: runes only ($state, $derived, $effect), no legacy stores, no on:event handlers (use onclick)
            - TypeScript: strict types, no `any` unless justified

            ## Architecture
            - New API endpoints must have corresponding TypeScript types in apps/web/src/lib/types/models.ts
            - New SignalR events must be handled on both ChatHub.cs and chat-hub.ts
            - State changes use domain stores under lib/state/, created via factory + setContext pattern
            - New external scripts/services require CSP updates in hooks.server.ts

            ## Testing
            - New controller methods need unit tests (xUnit + Moq + FluentAssertions)
            - New frontend logic needs Vitest tests
            - Data model changes need EF Core migration

            ## Required Updates
            - Data model changes → new EF Core migration + SeedData update
            - Auth changes → update docs/AUTH.md
            - User-visible changes → update docs/ARCHITECTURE.md, docs/FEATURES.md, PLAN.md
            - New env vars → update apps/web/.env.example

            Post a structured review with:
            1. Summary of changes
            2. Issues found (with severity)
            3. Suggestions for improvement
            4. Overall grade (A-F)
