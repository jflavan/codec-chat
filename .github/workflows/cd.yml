name: cd

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-codec-prod
  ACR_NAME: acrcodecprod
  API_APP_NAME: ca-codec-prod-api
  WEB_APP_NAME: ca-codec-prod-web
  ADMIN_APP_NAME: ca-codec-prod-admin
  VOICE_VM_NAME: vm-codec-prod-voice

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if infra pipeline handles this commit
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "Dispatch trigger, proceeding"
          else
            # Compare HEAD against its first parent to detect changed files.
            # For merge commits, diff-tree's default combined diff produces empty
            # output when the merge is clean, so we compare explicitly against HEAD~1.
            if git diff --name-only HEAD~1 HEAD -- 'infra/' | grep -q .; then
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              echo "Infra changes detected — deferring to infra pipeline"
            else
              echo "should-run=true" >> "$GITHUB_OUTPUT"
              echo "No infra changes, proceeding with CD"
            fi
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should-run == 'true'
    outputs:
      image-tag: ${{ github.sha }}
      voice-enabled: ${{ steps.voice-detect.outputs.enabled }}
      voice-fqdn: ${{ steps.voice-detect.outputs.fqdn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect voice VM
        id: voice-detect
        run: |
          FQDN=$(az network public-ip show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VOICE_VM_NAME }}-pip \
            --query "dnsSettings.fqdn" -o tsv 2>/dev/null || true)
          if [ -n "$FQDN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
            echo "Voice VM detected: $FQDN"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "fqdn=" >> "$GITHUB_OUTPUT"
            echo "No voice VM found — voice features will be disabled"
          fi

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build API image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/codec-api:${{ github.sha }} \
                        -t ${{ env.ACR_NAME }}.azurecr.io/codec-api:latest \
                        ./apps/api

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/codec-api:${{ github.sha }}
          format: table
          exit-code: '0'  # Advisory — don't block deploys on CVEs
          severity: CRITICAL,HIGH

      - name: Push API image
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/codec-api:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/codec-api:latest

      - name: Build Web image
        env:
          LIVEKIT_URL: ${{ steps.voice-detect.outputs.enabled == 'true' && format('wss://{0}', steps.voice-detect.outputs.fqdn) || '' }}
        run: |
          docker build \
            --build-arg PUBLIC_API_BASE_URL=${{ secrets.PUBLIC_API_BASE_URL }} \
            --build-arg PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }} \
            --build-arg PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.PUBLIC_RECAPTCHA_SITE_KEY }} \
            --build-arg PUBLIC_GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }} \
            --build-arg PUBLIC_LIVEKIT_URL=${{ env.LIVEKIT_URL }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/codec-web:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/codec-web:latest \
            ./apps/web

      - name: Scan Web image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/codec-web:${{ github.sha }}
          format: table
          exit-code: '0'  # Advisory — don't block deploys on CVEs
          severity: CRITICAL,HIGH

      - name: Push Web image
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/codec-web:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/codec-web:latest

      - name: Build Admin image
        run: |
          docker build \
            --build-arg PUBLIC_API_BASE_URL=${{ secrets.PUBLIC_API_BASE_URL }} \
            --build-arg PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/codec-admin:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/codec-admin:latest \
            ./apps/admin

      - name: Scan Admin image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/codec-admin:${{ github.sha }}
          format: table
          exit-code: '0'  # Advisory — don't block deploys on CVEs
          severity: CRITICAL,HIGH

      - name: Push Admin image
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/codec-admin:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/codec-admin:latest

  deploy-voice:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.voice-enabled == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read LiveKit secrets from Key Vault
        id: livekit-secrets
        run: |
          API_KEY=$(az keyvault secret show \
            --vault-name kv-codec-prod \
            --name LiveKit--ApiKey \
            --query value -o tsv 2>/dev/null || echo "")
          API_SECRET=$(az keyvault secret show \
            --vault-name kv-codec-prod \
            --name LiveKit--ApiSecret \
            --query value -o tsv 2>/dev/null || echo "")
          if [ -n "$API_KEY" ] && [ -n "$API_SECRET" ]; then
            echo "::add-mask::$API_KEY"
            echo "::add-mask::$API_SECRET"
            echo "api-key=$API_KEY" >> "$GITHUB_OUTPUT"
            echo "api-secret=$API_SECRET" >> "$GITHUB_OUTPUT"
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::LiveKit secrets not found in Key Vault — voice services will start without authentication"
            echo "api-key=devkey" >> "$GITHUB_OUTPUT"
            echo "api-secret=secret-must-be-at-least-32-chars" >> "$GITHUB_OUTPUT"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Substitute variables in templates
        env:
          LIVEKIT_API_KEY: ${{ steps.livekit-secrets.outputs.api-key }}
          LIVEKIT_API_SECRET: ${{ steps.livekit-secrets.outputs.api-secret }}
          VOICE_DOMAIN: ${{ needs.build-and-push.outputs.voice-fqdn }}
        run: |
          envsubst '${LIVEKIT_API_KEY} ${LIVEKIT_API_SECRET} ${VOICE_DOMAIN}' \
            < infra/voice/docker-compose.yml \
            | base64 -w 0 > /tmp/compose-b64.txt
          envsubst '${VOICE_DOMAIN}' \
            < infra/voice/Caddyfile \
            | base64 -w 0 > /tmp/caddyfile-b64.txt

      - name: Write config files to VM
        run: |
          # Build a self-contained script that embeds base64 payloads as heredocs
          # to avoid shell injection via variable interpolation.
          COMPOSE_B64=$(cat /tmp/compose-b64.txt)
          LIVEKIT_YAML_B64=$(base64 -w 0 < infra/voice/livekit.yaml)
          CADDYFILE_B64=$(cat /tmp/caddyfile-b64.txt)
          cat > /tmp/deploy-voice.sh <<DEPLOY_EOF
          #!/bin/bash
          set -e
          echo "$COMPOSE_B64" | base64 -d > /opt/voice/docker-compose.yml
          chmod 600 /opt/voice/docker-compose.yml
          echo "$LIVEKIT_YAML_B64" | base64 -d > /opt/voice/livekit.yaml
          chmod 600 /opt/voice/livekit.yaml
          echo "$CADDYFILE_B64" | base64 -d > /opt/voice/Caddyfile
          chmod 600 /opt/voice/Caddyfile
          DEPLOY_EOF
          az vm run-command invoke \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VOICE_VM_NAME }} \
            --command-id RunShellScript \
            --scripts @/tmp/deploy-voice.sh

      - name: Pull and start voice services
        run: |
          az vm run-command invoke \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VOICE_VM_NAME }} \
            --command-id RunShellScript \
            --scripts "
              set -e
              docker compose -f /opt/voice/docker-compose.yml pull
              docker compose -f /opt/voice/docker-compose.yml up -d --remove-orphans
            "

      - name: Verify LiveKit health (internal)
        run: |
          STATUS=$(az vm run-command invoke \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VOICE_VM_NAME }} \
            --command-id RunShellScript \
            --scripts "
              for i in 1 2 3 4 5; do
                if docker compose -f /opt/voice/docker-compose.yml ps --format json | grep -q livekit; then
                  RUNNING=\$(docker compose -f /opt/voice/docker-compose.yml ps --format json | grep livekit | grep -c running || true)
                  if [ \"\$RUNNING\" -gt 0 ]; then echo LIVEKIT_OK; exit 0; fi
                fi
                sleep 5
              done
              echo LIVEKIT_FAIL
              docker compose -f /opt/voice/docker-compose.yml logs --tail=20
            " \
            --query "value[0].message" -o tsv 2>/dev/null || echo "FAILED")
          if [[ "$STATUS" != *"LIVEKIT_OK"* ]]; then
            echo "::error::LiveKit health check failed: $STATUS"
            exit 1
          fi
          echo "LiveKit internal health check passed"

      - name: Verify LiveKit TLS (external)
        run: |
          VOICE_FQDN="${{ needs.build-and-push.outputs.voice-fqdn }}"
          # Allow up to 60s for Caddy to provision the TLS certificate on first deploy
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://${VOICE_FQDN}" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "LiveKit TLS health check passed (HTTPS $HTTP_CODE)"
              exit 0
            fi
            echo "  Attempt $i/6 — HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          echo "::warning::LiveKit TLS health check did not return 200 (last: $HTTP_CODE). Caddy may still be provisioning the certificate."

  migrate-database:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 10.0.3

      - name: Restore and build
        working-directory: apps/api
        run: |
          dotnet restore Codec.Api/Codec.Api.csproj
          dotnet build Codec.Api/Codec.Api.csproj -c Release --no-restore

      - name: Build migration bundle
        working-directory: apps/api
        run: |
          dotnet ef migrations bundle \
            --project Codec.Api \
            --configuration Release \
            --no-build \
            --output ../../efbundle \
            --self-contained \
            --target-runtime linux-x64 \
            --force \
            --verbose

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Open PostgreSQL firewall for runner
        id: firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name psql-codec-prod \
            --rule-name AllowGitHubRunner \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
          echo "opened=true" >> "$GITHUB_OUTPUT"

      - name: Run migrations
        run: |
          CONNECTION_STRING=$(az keyvault secret show \
            --vault-name kv-codec-prod \
            --name ConnectionStrings--Default \
            --query value -o tsv)
          chmod +x ./efbundle
          ./efbundle --connection "$CONNECTION_STRING"

      - name: Close PostgreSQL firewall rule
        if: always() && steps.firewall.outputs.opened == 'true'
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name psql-codec-prod \
            --rule-name AllowGitHubRunner \
            --yes

  deploy:
    runs-on: ubuntu-latest
    needs: migrate-database
    environment: prod
    outputs:
      api-revision: ${{ steps.deploy-api.outputs.revision }}
      web-revision: ${{ steps.deploy-web.outputs.revision }}
      admin-revision: ${{ steps.deploy-admin.outputs.revision }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure multiple revision mode
        run: |
          az containerapp revision set-mode \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --mode multiple
          az containerapp revision set-mode \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --mode multiple
          az containerapp revision set-mode \
            --name ${{ env.ADMIN_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --mode multiple

      - name: Ensure container app registries
        run: |
          for APP in "${{ env.API_APP_NAME }}" "${{ env.WEB_APP_NAME }}" "${{ env.ADMIN_APP_NAME }}"; do
            echo "Ensuring ACR registry on $APP..."
            az containerapp registry set \
              --name "$APP" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ${{ env.ACR_NAME }}.azurecr.io \
              --identity system
          done

      - name: Deploy API staging revision
        id: deploy-api
        run: |
          SUFFIX="gh$(echo $GITHUB_SHA | cut -c1-7)n${{ github.run_number }}"
          RESULT=$(az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/codec-api:${{ github.sha }} \
            --revision-suffix "$SUFFIX" \
            --min-replicas 1 \
            -o json)
          REVISION_NAME=$(echo "$RESULT" | jq -r '.properties.latestRevisionName')
          echo "Created revision: $REVISION_NAME"
          echo "revision=$REVISION_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Web staging revision
        id: deploy-web
        run: |
          SUFFIX="gh$(echo $GITHUB_SHA | cut -c1-7)n${{ github.run_number }}"
          RESULT=$(az containerapp update \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/codec-web:${{ github.sha }} \
            --revision-suffix "$SUFFIX" \
            --min-replicas 1 \
            -o json)
          REVISION_NAME=$(echo "$RESULT" | jq -r '.properties.latestRevisionName')
          echo "Created revision: $REVISION_NAME"
          echo "revision=$REVISION_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Admin staging revision
        id: deploy-admin
        run: |
          SUFFIX="gh$(echo $GITHUB_SHA | cut -c1-7)n${{ github.run_number }}"
          RESULT=$(az containerapp update \
            --name ${{ env.ADMIN_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/codec-admin:${{ github.sha }} \
            --revision-suffix "$SUFFIX" \
            --min-replicas 1 \
            -o json)
          REVISION_NAME=$(echo "$RESULT" | jq -r '.properties.latestRevisionName')
          echo "Created revision: $REVISION_NAME"
          echo "revision=$REVISION_NAME" >> "$GITHUB_OUTPUT"

      - name: Wait for staging revisions to be ready
        run: |
          for APP_REVISION in "${{ steps.deploy-api.outputs.revision }}" "${{ steps.deploy-web.outputs.revision }}" "${{ steps.deploy-admin.outputs.revision }}"; do
            APP_NAME=$(echo "$APP_REVISION" | sed 's/--.*$//')
            echo "Waiting for revision $APP_REVISION..."
            for i in $(seq 1 60); do
              DETAIL=$(az containerapp revision show \
                --name "$APP_NAME" \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --revision "$APP_REVISION" \
                --query '{runningState:properties.runningState,healthState:properties.healthState,replicas:properties.replicas,active:properties.active}' \
                -o json 2>/dev/null || echo '{"runningState":"Unknown"}')
              STATUS=$(echo "$DETAIL" | jq -r '.runningState // "Unknown"')
              HEALTH=$(echo "$DETAIL" | jq -r '.healthState // "Unknown"')
              echo "  Attempt $i/60 — status=$STATUS health=$HEALTH detail=$DETAIL"
              if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Stopped" ]; then
                echo "::error::Revision $APP_REVISION failed to start (status: $STATUS)"
                echo "--- Full revision details ---"
                az containerapp revision show \
                  --name "$APP_NAME" \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --revision "$APP_REVISION" 2>/dev/null || true
                echo "--- Recent container logs ---"
                az containerapp logs show \
                  --name "$APP_NAME" \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --tail 50 --type system 2>/dev/null || true
                exit 1
              fi
              # Accept any running state combined with a healthy (or undetermined) health state
              if [ "$STATUS" = "Running" ] || [ "$STATUS" = "Degraded" ] || [ "$STATUS" = "RunningAtMaxScale" ]; then
                if [ "$HEALTH" = "Healthy" ] || [ "$HEALTH" = "None" ]; then
                  echo "Revision $APP_REVISION is ready (status: $STATUS, health: $HEALTH)"
                  break
                fi
                echo "  Revision is running but health is $HEALTH, continuing to wait..."
              fi
              if [ "$i" = "60" ]; then
                echo "::error::Timed out waiting for revision $APP_REVISION (last status: $STATUS, health: $HEALTH)"
                echo "--- Full revision details ---"
                az containerapp revision show \
                  --name "$APP_NAME" \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --revision "$APP_REVISION" 2>/dev/null || true
                echo "--- Recent container logs ---"
                az containerapp logs show \
                  --name "$APP_NAME" \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --tail 50 --type system 2>/dev/null || true
                exit 1
              fi
              sleep 10
            done
          done

      - name: Verify staging revisions are healthy
        run: |
          for APP_REVISION in "${{ steps.deploy-api.outputs.revision }}" "${{ steps.deploy-web.outputs.revision }}" "${{ steps.deploy-admin.outputs.revision }}"; do
            APP_NAME=$(echo "$APP_REVISION" | sed 's/--.*$//')
            DETAIL=$(az containerapp revision show \
              --name "$APP_NAME" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$APP_REVISION" \
              --query '{runningState:properties.runningState,healthState:properties.healthState,replicas:properties.replicas,active:properties.active}' \
              -o json)
            echo "Pre-switch check for $APP_REVISION: $DETAIL"
            HEALTH=$(echo "$DETAIL" | jq -r '.healthState // "Unknown"')
            ACTIVE=$(echo "$DETAIL" | jq -r '.active // false')
            if [ "$HEALTH" != "Healthy" ] && [ "$HEALTH" != "None" ]; then
              echo "::error::Revision $APP_REVISION is not healthy (healthState: $HEALTH)"
              exit 1
            fi
            if [ "$ACTIVE" != "true" ]; then
              echo "::error::Revision $APP_REVISION is not active"
              exit 1
            fi
            echo "Revision $APP_REVISION verified: healthy=$HEALTH active=$ACTIVE"
          done

      - name: Switch traffic to new revisions
        run: |
          az containerapp ingress traffic set \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision-weight "${{ steps.deploy-api.outputs.revision }}=100"

          az containerapp ingress traffic set \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision-weight "${{ steps.deploy-web.outputs.revision }}=100"

          az containerapp ingress traffic set \
            --name ${{ env.ADMIN_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision-weight "${{ steps.deploy-admin.outputs.revision }}=100"

      - name: Deactivate old revisions
        run: |
          OLD_API=$(az containerapp revision list \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?name!='${{ steps.deploy-api.outputs.revision }}' && properties.active].name" -o tsv)
          for rev in $OLD_API; do
            echo "Deactivating API revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.API_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$rev"
          done

          OLD_WEB=$(az containerapp revision list \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?name!='${{ steps.deploy-web.outputs.revision }}' && properties.active].name" -o tsv)
          for rev in $OLD_WEB; do
            echo "Deactivating Web revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.WEB_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$rev"
          done

          OLD_ADMIN=$(az containerapp revision list \
            --name ${{ env.ADMIN_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?name!='${{ steps.deploy-admin.outputs.revision }}' && properties.active].name" -o tsv)
          for rev in $OLD_ADMIN; do
            echo "Deactivating Admin revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.ADMIN_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$rev"
          done

      - name: Rollback — deactivate failed staging revisions
        if: failure()
        run: |
          az containerapp revision deactivate \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.deploy-api.outputs.revision }}" 2>/dev/null || true
          az containerapp revision deactivate \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.deploy-web.outputs.revision }}" 2>/dev/null || true
          az containerapp revision deactivate \
            --name ${{ env.ADMIN_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.deploy-admin.outputs.revision }}" 2>/dev/null || true

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get application FQDNs
        id: fqdns
        run: |
          API_FQDN=$(az containerapp show \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          WEB_FQDN=$(az containerapp show \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          ADMIN_FQDN=$(az containerapp show \
            --name ${{ env.ADMIN_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "api-fqdn=$API_FQDN" >> "$GITHUB_OUTPUT"
          echo "web-fqdn=$WEB_FQDN" >> "$GITHUB_OUTPUT"
          echo "admin-fqdn=$ADMIN_FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ steps.fqdns.outputs.api-fqdn }}/health/ready")
          if [ "$STATUS" != "200" ]; then
            echo "API health check failed with status $STATUS"
            exit 1
          fi
          echo "API health check passed (HTTP $STATUS)"

      - name: Smoke test Web health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ steps.fqdns.outputs.web-fqdn }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Web health check failed with status $STATUS"
            exit 1
          fi
          echo "Web health check passed (HTTP $STATUS)"

      - name: Smoke test Admin health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ steps.fqdns.outputs.admin-fqdn }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Admin health check failed with status $STATUS"
            exit 1
          fi
          echo "Admin health check passed (HTTP $STATUS)"
