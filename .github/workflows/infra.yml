name: infra

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  check-infra:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for infra changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — skipping diff check"
          else
            # Compare HEAD against its first parent to detect changed files.
            # For merge commits, diff-tree's default combined diff produces empty
            # output when the merge is clean, so we compare explicitly against HEAD~1.
            if git diff --name-only HEAD~1 HEAD -- 'infra/' '.github/workflows/infra.yml' | grep -q .; then
              echo "has-changes=true" >> "$GITHUB_OUTPUT"
              echo "Infrastructure changes detected"
            else
              echo "has-changes=false" >> "$GITHUB_OUTPUT"
              echo "No infrastructure changes detected"
            fi
          fi

  deploy-infra:
    needs: check-infra
    if: needs.check-infra.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource providers are registered
        run: |
          az provider register --namespace Microsoft.Cache --wait || \
            echo "::warning::Could not register Microsoft.Cache — ensure it is registered at the subscription level"

      - name: Resolve current container images
        id: images
        run: |
          FALLBACK="mcr.microsoft.com/k8se/quickstart:latest"

          API_IMAGE=$(az containerapp show \
            --name ca-codec-prod-api \
            --resource-group rg-codec-prod \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo "")
          if [ -z "$API_IMAGE" ]; then
            API_IMAGE="$FALLBACK"
          fi
          echo "api-image=$API_IMAGE" >> "$GITHUB_OUTPUT"
          echo "API image: $API_IMAGE"

          WEB_IMAGE=$(az containerapp show \
            --name ca-codec-prod-web \
            --resource-group rg-codec-prod \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo "")
          if [ -z "$WEB_IMAGE" ]; then
            WEB_IMAGE="$FALLBACK"
          fi
          echo "web-image=$WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Web image: $WEB_IMAGE"

      - name: Check if managed certificates exist
        id: certs
        run: |
          CERT_LIST=$(az containerapp env certificate list \
            --name cae-codec-prod \
            --resource-group rg-codec-prod \
            --query "[].name" -o tsv 2>/dev/null || echo "")

          if echo "$CERT_LIST" | grep -q "cert-api" && echo "$CERT_LIST" | grep -q "cert-web"; then
            echo "certs-exist=true" >> "$GITHUB_OUTPUT"
            echo "Both managed certificates exist"
          else
            echo "certs-exist=false" >> "$GITHUB_OUTPUT"
            echo "One or more managed certificates missing"
          fi

      - name: Preview infrastructure changes
        run: |
          az deployment group what-if \
            --resource-group rg-codec-prod \
            --template-file infra/main.bicep \
            --parameters \
              location='centralus' \
              environmentName='prod' \
              googleClientId='${{ secrets.GOOGLE_CLIENT_ID }}' \
              postgresqlAdminPassword='${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}' \
              globalAdminEmail='${{ secrets.GLOBAL_ADMIN_EMAIL }}' \
              webCustomDomain='codec-chat.com' \
              apiCustomDomain='api.codec-chat.com' \
              bindCertificates=true \
              apiContainerImage='${{ steps.images.outputs.api-image }}' \
              webContainerImage='${{ steps.images.outputs.web-image }}' \
              voiceVmEnabled=${{ vars.VOICE_VM_ENABLED == 'true' }} \
              voiceAdminSshPublicKey='${{ secrets.VOICE_ADMIN_SSH_PUBLIC_KEY }}' \
              voiceSshAllowedSourcePrefix='${{ vars.VOICE_SSH_ALLOWED_SOURCE_PREFIX }}' \
              voiceTurnSecret='${{ secrets.VOICE_TURN_SECRET }}' \
              voiceSfuInternalKey='${{ secrets.VOICE_SFU_INTERNAL_KEY }}' \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              gitHubToken='${{ secrets.GH_ISSUE_TOKEN }}' \
              redisEnabled=true \
              sfuDomainName='sfu.codec-chat.com' \
              certbotEmail='${{ secrets.CERTBOT_EMAIL }}' \
              emailEnabled=${{ vars.EMAIL_ENABLED == 'true' }}

      - name: Deploy infrastructure (register hostnames and create certificates)
        if: steps.certs.outputs.certs-exist != 'true'
        run: |
          az deployment group create \
            --resource-group rg-codec-prod \
            --template-file infra/main.bicep \
            --parameters \
              location='centralus' \
              environmentName='prod' \
              googleClientId='${{ secrets.GOOGLE_CLIENT_ID }}' \
              postgresqlAdminPassword='${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}' \
              globalAdminEmail='${{ secrets.GLOBAL_ADMIN_EMAIL }}' \
              webCustomDomain='codec-chat.com' \
              apiCustomDomain='api.codec-chat.com' \
              bindCertificates=false \
              apiContainerImage='${{ steps.images.outputs.api-image }}' \
              webContainerImage='${{ steps.images.outputs.web-image }}' \
              voiceVmEnabled=${{ vars.VOICE_VM_ENABLED == 'true' }} \
              voiceAdminSshPublicKey='${{ secrets.VOICE_ADMIN_SSH_PUBLIC_KEY }}' \
              voiceSshAllowedSourcePrefix='${{ vars.VOICE_SSH_ALLOWED_SOURCE_PREFIX }}' \
              voiceTurnSecret='${{ secrets.VOICE_TURN_SECRET }}' \
              voiceSfuInternalKey='${{ secrets.VOICE_SFU_INTERNAL_KEY }}' \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              gitHubToken='${{ secrets.GH_ISSUE_TOKEN }}' \
              redisEnabled=true \
              sfuDomainName='sfu.codec-chat.com' \
              certbotEmail='${{ secrets.CERTBOT_EMAIL }}' \
              emailEnabled=${{ vars.EMAIL_ENABLED == 'true' }}

      - name: Deploy infrastructure (bind certificates to custom domains)
        run: |
          az deployment group create \
            --resource-group rg-codec-prod \
            --template-file infra/main.bicep \
            --parameters \
              location='centralus' \
              environmentName='prod' \
              googleClientId='${{ secrets.GOOGLE_CLIENT_ID }}' \
              postgresqlAdminPassword='${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}' \
              globalAdminEmail='${{ secrets.GLOBAL_ADMIN_EMAIL }}' \
              webCustomDomain='codec-chat.com' \
              apiCustomDomain='api.codec-chat.com' \
              bindCertificates=true \
              apiContainerImage='${{ steps.images.outputs.api-image }}' \
              webContainerImage='${{ steps.images.outputs.web-image }}' \
              voiceVmEnabled=${{ vars.VOICE_VM_ENABLED == 'true' }} \
              voiceAdminSshPublicKey='${{ secrets.VOICE_ADMIN_SSH_PUBLIC_KEY }}' \
              voiceSshAllowedSourcePrefix='${{ vars.VOICE_SSH_ALLOWED_SOURCE_PREFIX }}' \
              voiceTurnSecret='${{ secrets.VOICE_TURN_SECRET }}' \
              voiceSfuInternalKey='${{ secrets.VOICE_SFU_INTERNAL_KEY }}' \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              gitHubToken='${{ secrets.GH_ISSUE_TOKEN }}' \
              redisEnabled=true \
              sfuDomainName='sfu.codec-chat.com' \
              certbotEmail='${{ secrets.CERTBOT_EMAIL }}' \
              emailEnabled=${{ vars.EMAIL_ENABLED == 'true' }}

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group rg-codec-prod \
            --name main \
            --query properties.outputs \
            --output table

      - name: Trigger CD pipeline
        run: gh workflow run cd.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
