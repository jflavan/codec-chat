# Production voice service — LiveKit server.
# Deployed to /opt/voice/docker-compose.yml on the voice VM by CI/CD.
# CI/CD substitutes the ${...} variables before writing the file to the VM.
#
# Required substitutions (set as env vars before running envsubst):
#   LIVEKIT_API_KEY     — LiveKit API key for client/server authentication
#   LIVEKIT_API_SECRET  — LiveKit API secret for signing tokens

services:
  livekit:
    image: livekit/livekit-server:v1.10.1
    restart: unless-stopped
    ports:
      - "7880:7880"          # Signal (WebSocket)
      - "7881:7881"          # RTC TCP fallback
      - "3478:3478/udp"      # Built-in TURN
      - "50000-60000:50000-60000/udp"  # WebRTC media
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}
