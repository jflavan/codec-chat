# Production voice service — LiveKit server with Caddy TLS reverse proxy.
# Deployed to /opt/voice/docker-compose.yml on the voice VM by CI/CD.
# CI/CD substitutes the ${...} variables before writing the file to the VM.
#
# Required substitutions (set as env vars before running envsubst):
#   LIVEKIT_API_KEY     — LiveKit API key for client/server authentication
#   LIVEKIT_API_SECRET  — LiveKit API secret for signing tokens
#   VOICE_DOMAIN        — Public FQDN for TLS certificate (e.g. codec-voice.eastus.cloudapp.azure.com)

services:
  livekit:
    image: livekit/livekit-server:v1.10.1
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"

  caddy:
    image: caddy:2
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
